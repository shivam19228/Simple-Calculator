<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Calculator | Internship Project</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="col-md-4 col-sm-10">
            <div class="card shadow-lg border-0 bg-dark p-3 rounded-4">
                
                <h5 class="text-white text-center mb-3 fw-light">Calculator</h5>

                <div class="mb-4">
                    <input type="text" id="result" 
                           class="form-control form-control-lg text-end bg-black text-success border-0 shadow-none" 
                           style="font-family: 'Courier New', Courier, monospace; height: 70px; font-size: 2rem;" 
                           placeholder="0" readonly>
                </div>

                <div class="row g-2">
                    <div class="col-3"><button class="btn btn-outline-danger w-100 py-3" onclick="clearScreen()">AC</button></div>
                    <div class="col-3"><button class="btn btn-outline-warning w-100 py-3" onclick="deleteLast()">DEL</button></div>
                    <div class="col-3"><button class="btn btn-outline-info w-100 py-3" onclick="display('/')">÷</button></div>
                    <div class="col-3"><button class="btn btn-outline-info w-100 py-3" onclick="display('*')">×</button></div>
                    
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('7')">7</button></div>
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('8')">8</button></div>
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('9')">9</button></div>
                    <div class="col-3"><button class="btn btn-outline-info w-100 py-3" onclick="display('-')">−</button></div>
                    
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('4')">4</button></div>
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('5')">5</button></div>
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('6')">6</button></div>
                    <div class="col-3"><button class="btn btn-outline-info w-100 py-3" onclick="display('+')">+</button></div>
                    
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('1')">1</button></div>
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('2')">2</button></div>
                    <div class="col-3"><button class="btn btn-dark w-100 py-3" onclick="display('3')">3</button></div>
                    <div class="col-3"><button class="btn btn-primary w-100 py-3" onclick="calculate()">=</button></div>
                    
                    <div class="col-6"><button class="btn btn-dark w-100 py-3" onclick="display('0')">0</button></div>
                    <div class="col-6"><button class="btn btn-dark w-100 py-3" onclick="display('.')">.</button></div>
                </div>
            </div>
            <p class="text-center mt-3 text-muted small">Built with HTML, Bootstrap & JS</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
